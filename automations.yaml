- id: '1773157222837'
  alias: 'PKM: Morning Bridge Reminder'
  description: Activity-triggered morning reminder. Fires when phone starts discharging
    (proxy for waking up). Waits 5 min, then sends push with action buttons and a
    writing prompt to ReMarkable.
  triggers:
  - platform: state
    entity_id: sensor.s23bart_battery_state
    from: charging
    to: discharging
    id: phone_unplugged
  - platform: state
    entity_id: sensor.s23bart_battery_state
    from: not_charging
    to: discharging
    id: phone_unplugged
  conditions:
  - condition: time
    after: 06:00:00
    before: '10:30:00'
  - condition: state
    entity_id: input_boolean.pkm_day_active
    state: 'off'
  - condition: state
    entity_id: input_boolean.morning_bridge_done
    state: 'off'
  actions:
  - action: input_boolean.turn_on
    target:
      entity_id: input_boolean.pkm_day_active
  - delay:
      minutes: 5
  - variables:
      prompt: '{{ ["Open Anytype, maak je Daily Log aan, en begin met The Headspace.
        Wat is het eerste waar je dankbaar voor bent?", "Nieuwe dag, schone lei. Open
        de Motherlode en start je Morning Bridge. Hoe kom je vandaag aan?", "De Bridge
        wacht. ReMarkable inbox + Anytype inbox — maak ze leeg. En schrijf minstens
        een Nugget van gisteren.", "Goedemorgen. Pak je Daily Log erbij. Een ding
        om dankbaar voor te zijn, en dan de Bridge.", "Start je dag bewust. Open Anytype,
        vul The Headspace in, en kijk wat er op de ReMarkable staat."] | random }}'
  - action: notify.mobile_app_s23bart
    data:
      title: Goedemorgen — Time for the Bridge
      message: '{{ prompt }}'
      data:
        tag: pkm-morning-bridge
        channel: PKM Coach
        importance: default
        sticky: true
        actions:
        - action: BRIDGE_DONE
          title: Bridge gedaan
        - action: BRIDGE_SKIP
          title: Skip vandaag
  - event: remarkable_prompt
    event_data:
      prompt: '{{ prompt }}'
      title: Morning Bridge
  - action: input_boolean.turn_on
    target:
      entity_id: input_boolean.morning_bridge_reminder_sent
  mode: single
- id: '1773157224535'
  alias: 'PKM: Morning Bridge Follow-Up'
  description: Gentle nudge 2.5 hours after morning reminder if Bridge not yet done.
    Never fires before 10:00 AM.
  triggers:
  - platform: state
    entity_id: input_boolean.morning_bridge_reminder_sent
    to: 'on'
  conditions:
  - condition: state
    entity_id: input_boolean.morning_bridge_done
    state: 'off'
  actions:
  - delay:
      hours: 2
      minutes: 30
  - if:
    - condition: time
      before: '10:00:00'
    then:
    - wait_for_trigger:
      - platform: time
        at: '10:00:00'
      timeout: 04:00:00
  - condition: state
    entity_id: input_boolean.morning_bridge_done
    state: 'off'
  - action: notify.mobile_app_s23bart
    data:
      title: Bridge nog niet gedaan
      message: '{{ ["Je Bridge staat nog open. Zelfs 5 minuten telt — open Anytype
        en schrijf alleen The Headspace.", "Nog geen Bridge vandaag. Geen druk — maar
        ook alleen de gratitude invullen is al een win.", "De Motherlode wacht. Zelfs
        een halve Bridge is beter dan geen Bridge. Open je Daily Log."] | random }}'
      data:
        tag: pkm-morning-bridge-followup
        channel: PKM Coach
        importance: low
        sticky: true
        actions:
        - action: BRIDGE_DONE
          title: Alsnog gedaan
        - action: BRIDGE_SKIP
          title: Niet vandaag
  mode: single
- id: '1773157226407'
  alias: 'PKM: Midday Writing Prompt'
  description: Weekday 12:30 writing prompt to capture Nuggets and observations. Rotates
    through 15 Dutch prompts focused on team/leadership/knowledge capture. Sends to
    phone and ReMarkable.
  triggers:
  - platform: time
    at: '12:30:00'
  conditions:
  - condition: time
    weekday:
    - mon
    - tue
    - wed
    - thu
    - fri
  actions:
  - variables:
      prompt_idx: '{{ states(''input_number.midday_prompt_index'') | int }}'
      prompts:
      - Wat heb je vanochtend geleerd dat je nergens hebt opgeschreven? Maak er een
        Nugget van.
      - Heb je een beslissing genomen vandaag? Schrijf op WAAROM je die keuze maakte
        — je toekomstige zelf zal je dankbaar zijn.
      - Welk gesprek van vandaag verdient een plek in je Daily Log? Schrijf het op
        voor je het vergeet.
      - Is er iets dat je team vandaag deed waar je trots op bent? Noteer het — ook
        kleine dingen tellen.
      - Heb je iets gezien dat beter kan in het team? Schrijf het op als observatie,
        niet als klacht. Dat is architectuur.
      - Waar heb je vandaag de meeste energie van gekregen? Dat is een signaal — leg
        het vast.
      - Is er een patroon dat je herkent in je werk deze week? Patronen zijn Nuggets
        waard.
      - 'Wat zou je je coach vertellen als ze nu vroeg: hoe gaat het? Schrijf dat
        antwoord op.'
      - Heb je iemand in het team iets zien doen dat je verraste? Positief of negatief
        — noteer het.
      - Kun je in een zin beschrijven wat je vanochtend hebt bereikt? Als je het niet
        kunt, schrijf op waarom niet.
      - Welke vraag van een collega liet je nadenken? Die vragen zijn goud — maak
        er een Nugget van.
      - Stel je kijkt over een maand terug op vandaag. Wat zou je willen dat je had
        opgeschreven?
      - Heb je vandaag iets uitgelegd aan iemand? Schrijf je uitleg op — dat is kenniscreatie.
      - Wat is het meest onverwachte dat er vandaag gebeurde? Leg het vast.
      - Is er iets dat je uitstelt? Schrijf het op. Uitstelgedrag is ook informatie.
  - action: notify.mobile_app_s23bart
    data:
      title: Middag check-in
      message: '{{ prompts[prompt_idx | int] }}'
      data:
        tag: pkm-midday
        channel: PKM Coach
        importance: low
  - event: remarkable_prompt
    event_data:
      prompt: '{{ prompts[prompt_idx | int] }}'
      title: Middag Check-in
  - action: input_number.set_value
    target:
      entity_id: input_number.midday_prompt_index
    data:
      value: '{{ ((prompt_idx | int) + 1) % 15 }}'
  mode: single
- id: '1773157227847'
  alias: 'PKM: Evening Reflection'
  description: 21:00 evening reflection prompt with rotating Dutch prompts. Acknowledges
    if Morning Bridge was skipped. Sends to phone and ReMarkable.
  triggers:
  - platform: time
    at: '21:00:00'
  conditions:
  - condition: state
    entity_id: input_boolean.evening_reflection_done
    state: 'off'
  actions:
  - variables:
      prompt_idx: '{{ states(''input_number.writing_prompt_index'') | int }}'
      bridge_done: '{{ is_state(''input_boolean.morning_bridge_done'', ''on'') }}'
      prompts:
      - Wat was het moeilijkste moment vandaag? Hoe heb je het opgelost?
      - Heb je vandaag iets gedaan als architect — of alleen als uitvoerder? Reflecteer.
      - Waar zat de meeste frictie vandaag? Is dat een patroon?
      - Wat zou je morgen anders doen als je vandaag opnieuw kon?
      - Heb je vandaag ruimte gemaakt voor het team om zelf beslissingen te nemen?
      - Welk inzicht van je coaching sessie heb je vandaag toegepast?
      - Als je je dag in drie woorden moet samenvatten, welke zijn dat?
      - Heb je vandaag gehandeld alsof het ideale team al bestaat?
      - Wat heb je vandaag NIET gedaan dat je eigenlijk had moeten doen? Waarom niet?
      - Wie heeft je vandaag geholpen? Heb je dat laten merken?
      - Beschrijf een moment vandaag waarop je bewust een keuze maakte. Waarom die
        keuze?
      - Wat was het meest waardevolle gesprek van vandaag? Met wie, en waarover?
      - Heb je vandaag iets afgemaakt? Of alleen dingen gestart?
      - Waar kijk je morgen het meest naar uit? En waar zie je tegenop?
      - Welk onderdeel van je werk geeft je de meeste voldoening deze week?
      - Heb je vandaag iemand laten groeien? Hoe?
      - Wat is een ding dat je hebt geleerd maar nog nergens hebt vastgelegd?
      - Scoorde je vandaag een win voor het team? Of alleen voor jezelf?
      - Voelde je vandaag meer als ontwerper of als brandweerman?
      - Wat voor leider was je vandaag? Is dat de leider die je wilt zijn?
      - Heb je een moment gehad vandaag waarop je echt aanwezig was?
      - Welke gewoonte wil je morgen bewust vasthouden?
      - Waar ben je nu, om 21:00, het meest dankbaar voor?
      - Heb je vandaag een Nugget gecreeerd? Zo niet, welke zou het zijn?
      - Wat zou je coach zeggen als ze je dag had gezien?
      - Heb je vandaag iets losgelaten dat je eigenlijk niet hoefde te doen?
      - Is er een beslissing die je vandaag hebt uitgesteld? Waarom?
      - Welke interactie met een teamlid wil je onthouden?
      - Heb je vandaag iets gedaan dat je een maand geleden niet had gekund?
      - Schrijf drie zinnen over vandaag. Niet meer, niet minder.
  - action: notify.mobile_app_s23bart
    data:
      title: Avondreflectie — Daily Log
      message: '{% if not bridge_done %}Je hebt vandaag geen Bridge gedaan — geen
        stress. Maar neem nu 5 minuten om je dag af te sluiten in Anytype.


        {% endif %}{{ prompts[prompt_idx | int] }}


        Vul ook je habits en mood in.'
      data:
        tag: pkm-evening
        channel: PKM Coach
        importance: default
        sticky: true
        actions:
        - action: REFLECTION_DONE
          title: Reflectie gedaan
        - action: REFLECTION_SKIP
          title: Niet vanavond
  - event: remarkable_prompt
    event_data:
      prompt: '{{ prompts[prompt_idx | int] }}'
      title: Avondreflectie
  - action: input_number.set_value
    target:
      entity_id: input_number.writing_prompt_index
    data:
      value: '{{ ((prompt_idx | int) + 1) % 30 }}'
  mode: single
