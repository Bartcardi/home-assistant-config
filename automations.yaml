- id: '1773157150488'
  alias: 'PKM: Handle Bridge Action'
  description: Handle notification action buttons for Morning Bridge (done/skip).
    Increments streak on done, resets on skip.
  triggers:
  - platform: event
    event_type: mobile_app_notification_action
    event_data:
      action: BRIDGE_DONE
    id: done
  - platform: event
    event_type: mobile_app_notification_action
    event_data:
      action: BRIDGE_SKIP
    id: skip
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: done
      sequence:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.morning_bridge_done
      - action: counter.increment
        target:
          entity_id: counter.morning_bridge_streak
      - action: notify.mobile_app_s23bart
        data:
          title: Nice
          message: 'Bridge done. Streak: {{ states(''counter.morning_bridge_streak'')
            }} dagen.'
          data:
            tag: pkm-morning-bridge
            channel: PKM Coach
      - action: notify.mobile_app_s23bart
        data:
          message: clear_notification
          data:
            tag: pkm-morning-bridge-followup
    - conditions:
      - condition: trigger
        id: skip
      sequence:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.morning_bridge_done
      - action: counter.reset
        target:
          entity_id: counter.morning_bridge_streak
      - action: notify.mobile_app_s23bart
        data:
          message: clear_notification
          data:
            tag: pkm-morning-bridge
      - action: notify.mobile_app_s23bart
        data:
          message: clear_notification
          data:
            tag: pkm-morning-bridge-followup
  mode: single
- id: '1773157151952'
  alias: 'PKM: Handle Reflection Action'
